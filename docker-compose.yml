version: '3.8'

services:
  app:
    build: .
    container_name: owasp_bot_app
    restart: always
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    ports:
      - "${WEB_PORT:-8000}:${WEB_PORT:-8000}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${WEB_PORT:-8000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  data:
  logs:
